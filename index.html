<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Cloudflare Web Proxy</title>
<style>
body{
font-family:sans-serif;
text-align:center;
margin-top:100px;
}

input{
width:300px;
padding:10px;
}

button{
padding:10px;
} </style>

</head>

<body>

<h1>Web Proxy</h1>

<input id="url" placeholder="https://example.com">
<button onclick="go()">GO</button>

<iframe id="frame" style="width:100%;height:80vh;border:none;"></iframe>

<script>

function go(){

let url=document.getElementById("url").value

if(!url.startsWith("http")){
url="https://"+url
}

document.getElementById("frame").src="/service/"+btoa(url)

}

</script>

</body>
</html>
